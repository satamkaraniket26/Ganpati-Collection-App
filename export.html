<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Export Center</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkLogin()">

<div class="app-layout">

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="logo.png" alt="Logo">

            <h2>Ganesh Collection</h2>

        </div>

        <nav>

            <a href="home.html">
                Home
            </a>

            <a href="grand-dashboard.html">
                Grand Dashboard
            </a>

            <button class="dropdown-btn">

                Reports ▼

            </button>

            <div class="dropdown-container">

                <a href="daily-report.html">
                    Daily Report
                </a>

                <a href="society-summary.html">
                    Society Summary
                </a>

                <a href="universal-search.html">
                    Universal Search
                </a>

                <a href="export.html" class="active">
                    Export
                </a>

            </div>

            <a href="receipt-lookup.html">
                Receipt Lookup
            </a>

            <a href="volunteer-dashboard.html">
                Volunteer Dashboard
            </a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <button
                class="menu-btn"
                onclick="toggleSidebar()">

                ☰

            </button>

            <h2>Export Center</h2>

            <div class="user-box" id="welcomeUser"></div>

        </div>

        <div class="page-header">

            <h2>Export Collection Data</h2>

            <p>

                Download collection and expense records in Excel format.

            </p>

        </div>

        <div class="action-grid">

            <button
                class="action-btn"
                onclick="exportExcel('Vargani')">

                <h3>Vargani</h3>

                <span>Export Vargani Records</span>

            </button>

            <button
                class="action-btn"
                onclick="exportExcel('Political')">

                <h3>Political</h3>

                <span>Export Political Donations</span>

            </button>

            <button
                class="action-btn"
                onclick="exportExcel('Vendor')">

                <h3>Vendor</h3>

                <span>Export Vendor Records</span>

            </button>

            <button
                class="action-btn"
                onclick="exportExcel('Recovery')">

                <h3>Recovery</h3>

                <span>Export Recovery Records</span>

            </button>

            <button
                class="action-btn"
                onclick="exportExcel('Expenses')">

                <h3>Expenses</h3>

                <span>Export Expense Records</span>

            </button>

            <button
                class="action-btn"
                onclick="exportExcel('ALL')">

                <h3>All Data</h3>

                <span>Export Complete Database</span>

            </button>

        </div>

        <div class="button-row" style="margin-top:30px;">

            <button
                class="secondary-btn"
                onclick="location.href='home.html'">

                Back

            </button>

        </div>

    </main>

</div>

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-box">

        <div class="loader"></div>

        <h3 id="loadingText">Please Wait...</h3>

        <p>Processing Request</p>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
