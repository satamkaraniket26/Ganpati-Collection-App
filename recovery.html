<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Recovery Collection</title>

<link rel="stylesheet"
href="style.css">

</head>

<body onload="checkLogin()">

<div class="page-logo">
<img src="logo.png" alt="Mandal Logo">
</div>

<div class="header-card">

<h2>
🔄 Recovery Collection
</h2>

</div>

<div class="form-card">

<input
id="building"
placeholder="Building Name">

<input
id="wing"
placeholder="Wing">

<input
id="roomNo"
placeholder="Room Number">

<input
id="donorName"
placeholder="Donor Name">

<input
id="mobile"
placeholder="Mobile Number (Optional)">

<input
id="recoveredAmount"
type="number"
placeholder="Recovered Amount">

<label class="checkbox-row">

<input
type="checkbox"
id="sendWhatsapp"
checked>

Send WhatsApp Receipt

</label>

<button
onclick="saveRecovery()">

💾 Save Recovery

</button>

</div>

<br>

<div class="back-new-entry">

<button
onclick="location.href='new-entry.html'">

📂 Back To New Entry

</button>

</div>

<script src="app.js"></script>

</body>
</html>
