<!DOCTYPE html>
<html>
<div class="page-logo">
    <img src="logo.png" alt="Mandal Logo">
    </div>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Recovery Collection</title>

<link rel="stylesheet"
href="style.css">

</head>

<body onload="checkLogin()">

<div class="header-card">

<h2>
🔄 Recovery Collection
</h2>

</div>

<div class="form-card">

<input
id="building"
placeholder="Building Name">

<input
id="wing"
placeholder="Wing">

<input
id="roomNo"
placeholder="Room Number">

<input
id="donorName"
placeholder="Donor Name">

<input
id="mobile"
placeholder="Mobile Number (Optional)">

<input
id="pendingAmount"
type="number"
placeholder="Original Amount">

<input
id="recoveredAmount"
type="number"
placeholder="Recovered Amount">

<input
id="balancePending"
placeholder="Balance Pending"
readonly>

<input
id="originalAmount"
type="number"
placeholder="Original Amount"
onkeyup="calculatePending()">

<input
id="recoveredAmount"
type="number"
placeholder="Recovered Amount"
onkeyup="calculatePending()">

<input
id="balancePending"
readonly
placeholder="Balance Pending">

<label class="checkbox-row">

<input
type="checkbox"
id="sendWhatsapp"
checked>

Send WhatsApp Receipt

</label>

<button
onclick="saveRecovery()">

💾 Save Recovery

</button>

</div>

<script src="app.js"></script>

</body>

</html>
