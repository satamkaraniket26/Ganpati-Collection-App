<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Society Summary</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkLogin();loadSocietySummary()">

<div class="app-layout">

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="logo.png" alt="Logo">

            <h2>Ganesh Collection</h2>

        </div>

        <nav>

            <a href="home.html">Home</a>

            <a href="grand-dashboard.html">Grand Dashboard</a>

            <button class="dropdown-btn">

                Reports ▼

            </button>

            <div class="dropdown-container">

                <a href="daily-report.html">Daily Report</a>

                <a href="society-summary.html" class="active">Society Summary</a>

                <a href="universal-search.html">Universal Search</a>

                <a href="export.html">Export</a>

            </div>

            <a href="receipt-lookup.html">Receipt Lookup</a>

            <a href="volunteer-dashboard.html">Volunteer Dashboard</a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <button
                class="menu-btn"
                onclick="toggleSidebar()">

                ☰

            </button>

            <h2>Society Summary</h2>

            <div class="user-box" id="welcomeUser"></div>

        </div>

        <div class="page-header">

            <h2>Society Collection Summary</h2>

            <p>

                View building-wise collection totals across all societies.

            </p>

        </div>

        <div class="content-card">

            <div id="societyContainer">

                Loading summary...

            </div>

            <div class="button-row">

                <button
                    class="secondary-btn"
                    onclick="location.href='home.html'">

                    Back

                </button>

                <button
                    class="primary-btn"
                    onclick="exportSocietySummary()">

                    Export Summary

                </button>

            </div>

        </div>

    </main>

</div>

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-box">

        <div class="loader"></div>

        <h3 id="loadingText">Please Wait...</h3>

        <p>Processing Request</p>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
