<!DOCTYPE html>
<html>
<div class="page-logo">
    <img src="logo.png" alt="Mandal Logo">
    </div>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Vendor Collection</title>

<link rel="stylesheet"
href="style.css">

</head>

<body onload="checkLogin()">

<div class="header-card">

<h2>
🏪 Vendor Collection
</h2>

</div>

<div class="form-card">

<input
id="shopName"
placeholder="Shop Name">

<input
id="ownerName"
placeholder="Owner Name">

<input
id="mobile"
placeholder="Mobile Number (Optional)">

<textarea
id="address"
placeholder="Address"></textarea>

<input
id="amount"
type="number"
placeholder="Amount">

<label class="checkbox-row">

<input
type="checkbox"
id="sendWhatsapp"
checked>

Send WhatsApp Receipt

</label>

<button
onclick="saveVendor()">

💾 Save Collection

</button>

</div>

<script src="app.js"></script>

</body>

</html>
