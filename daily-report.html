<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Report</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="checkLogin();loadDailyReport()">

<div class="app-layout">

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="logo.png" alt="Logo">

            <h2>Ganesh Collection</h2>

        </div>

        <nav>

            <a href="home.html">Home</a>

            <a href="grand-dashboard.html">Grand Dashboard</a>

            <button class="dropdown-btn">

                Reports ▼

            </button>

            <div class="dropdown-container">

                <a href="daily-report.html" class="active">Daily Report</a>

                <a href="society-summary.html">Society Summary</a>

                <a href="universal-search.html">Universal Search</a>

                <a href="export.html">Export</a>

            <a href="receipt-lookup.html">Receipt Lookup</a>

            <a href="volunteer-dashboard.html">Volunteer Dashboard</a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <button
                class="menu-btn"
                onclick="toggleSidebar()">

                ☰

            </button>

            <h2>Daily Report</h2>

            <div class="user-box" id="welcomeUser"></div>

        </div>

        <div class="page-header">

            <h2>Today's Collection Report</h2>

            <p>

                View volunteer-wise collection summary for the current day.

            </p>

        </div>

        <div class="content-card">

            <div id="dailyReportContainer">

                Loading report...

            </div>

        </div>

    </main>

</div>

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-box">

        <div class="loader"></div>

        <h3 id="loadingText">Please Wait...</h3>

        <p>Processing Request</p>

    </div>

</div>

<script src="app.js"></script>

</html>
