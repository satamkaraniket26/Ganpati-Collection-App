<!DOCTYPE html>
<html>

<head>

<link rel="icon" href="logo.png">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Collection Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-card">

<div class="login-logo">

<img src="logo.png" alt="Mandal Logo">
</div>

<h2>श्री सिद्धिविनायक सार्वजनिक गणेशोत्सव मंडळ</h2>

<p class="subtitle">
Collection Management System
</p>

<form onsubmit="login(); return false;">

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button
id="loginBtn"
type="submit">

LOGIN

</button>

</form>

<div class="login-footer">
Version 1.0 • © Shri Siddhivinayak Sarvajanik Ganeshotsav Mandal
</div>

</div>

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-box">

        <div class="loader"></div>

        <h3 id="loadingText">Please Wait...</h3>

        <p>Processing Request</p>

    </div>

</div>

<script src="app.js"></script>

</body>

</html>
