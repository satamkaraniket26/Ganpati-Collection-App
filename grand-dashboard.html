<!DOCTYPE html>

    </div>

content="width=device-width, initial-scale=1.0">

</h1>

</div>

<div class="stat-card">

<h3>Total Vendor</h3>

<h1 id="vendorTotal">
₹0
</h1>

</div>

<h1 id="recoveryTotal">
₹0
</h1>

</div>

<div class="stat-card">

<h1 id="expenseTotal">
₹0
</h1>

</div>

<h1 id="netBalance">

</h1>

<br>
